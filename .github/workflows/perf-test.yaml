      - name: Save execution metadata
        if: ${{ github.event.action != 'closed' }}
        env:
          FLAGS_INPUT: ${{ inputs.flags }}
          RESULT_NUMBER_INPUT: ${{ inputs.result_number }}
          ORGANIZATION_INPUT: ${{ inputs.organization }}
