name: MIGraphX Performance Tests Reusable

on:
  workflow_call:
    inputs:
      rocm_release:
        type: string
        description: ROCm release version
        required: true
      performance_reports_repo:
        type: string
        description: Result repository
        required: true
      benchmark_utils_repo:
        type: string
        description: Repository where benchmark utils are stored
        required: true
      organization:
        type: string
        description: Organization based on which location of files will be different
        required: true
      result_number:
        type: string
        description: Number of last results
        required: true
      model_timeout:
        type: string
        description: If model in performance test script passes this threshold, it will be skipped
        required: true
      flags:
        type: string
        description: -m for Max value; -s for Std dev; -r 'path' for Threshold file
        required: true
      performance_backup_repo:
        type: string
        description: Repository for backup
        required: true
      model_path:
        type: string
        description: Host path to NFS-backed models (ARC runner mount)
        required: true
      perf_workspace:
        type: string
        description: Writable NFS-backed workspace for reports/scratch (ARC runner mount)
        required: true
      runs_on:
        type: string
        description: Self-hosted runner label (ARC scale set linux-migraphx-mi250-1)
        required: true
    secrets:
      BENCHMARK_UTILS_READ_TOKEN:
        description: Token with read access to benchmark utils repo
        required: true

env:
  UTILS_DIR: benchmark-utils
  DOCKERBASE: rocm-migraphx:${{ inputs.rocm_release }}
  PR_ID: ${{ github.event.number }}
  BRANCH_NAME: develop
  TEST_RESULTS_PATH: ${{ inputs.perf_workspace }}/${{ inputs.organization }}/test-results

jobs:
  build_product:
    name: Build MIGraphX
    runs-on: ubuntu-24.04
    outputs:
      image_tag: ${{ steps.image_hash.outputs.imagetag }}
    steps:
      - name: Update PR env
        if: ${{ github.event_name == 'pull_request_target' || github.event_name == 'schedule'}}
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ -z "$PR_ID" ]; then
            PR_ID="develop"
          fi
          sanitized_branch_name=$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9._\/]/-/g')
          echo "BRANCH_NAME=$sanitized_branch_name" >> $GITHUB_ENV
          echo "TEST_RESULTS_PATH=$(echo "$TEST_RESULTS_PATH-$PR_ID")" >> $GITHUB_ENV

      - name: Checkout code
        if: ${{ github.event.action != 'closed' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.BRANCH_NAME }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}

      - name: Free space and setup swap
        if: ${{ github.event.action != 'closed' }}
        uses: jlumbroso/free-disk-space@main
        continue-on-error: true
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
          docker-images: true

      # - name: Create Image Tag
      #   id: image_hash
